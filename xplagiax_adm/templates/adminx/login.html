<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Sign in — XplagiaX Admin</title>
<style>
/* Mismo sistema visual que appcli2/adminx (ver adminx/base.html y
   xplagiax_appcli2/templates/user/activate_account.html). */
:root{--primary:#064CDB;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Open Sans',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
background:#eef2f7;color:#334155;font-size:14px;min-height:100vh;
display:flex;align-items:center;justify-content:center;padding:18px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;
box-shadow:0 4px 20px rgba(15,23,42,.08);width:100%;max-width:400px;overflow:hidden}
.head{background:var(--primary);padding:24px 26px}
.head .brand{color:#fff;font-size:20px;font-weight:800}
.head .brand span{opacity:.85}
.head small{display:block;color:rgba(255,255,255,.78);font-size:11.5px;margin-top:2px;
text-transform:uppercase;letter-spacing:.06em}
.body{padding:26px}
h1{font-size:17px;color:var(--ink);margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10.5px;font-weight:700;color:var(--muted);
text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input{width:100%;font:inherit;padding:11px 13px;border:1px solid var(--line);
border-radius:10px;color:var(--ink);outline:none}
.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px #064CDB1a}
.remember{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);margin-bottom:16px}
.btn{width:100%;background:var(--primary);color:#fff;border:0;border-radius:10px;
font:inherit;font-weight:700;font-size:14px;padding:13px;cursor:pointer}
.btn:hover{background:#0540b8}
.btn[disabled]{opacity:.6;cursor:default}
.msg{border-radius:10px;padding:11px 14px;font-size:12.5px;margin-bottom:14px;display:none}
.msg.err{display:block;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.foot{text-align:center;font-size:11px;color:var(--muted);margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="brand"><span>&times;</span>plagia<span>&times;</span></div>
    <small>Admin Panel</small>
  </div>
  <div class="body">
    <h1>Sign in to your account</h1>
    <div class="msg" id="msg"></div>
    <form id="frm" autocomplete="on">
      <div class="field"><label>Email</label>
        <input type="email" id="email" required autofocus></div>
      <div class="field"><label>Password</label>
        <input type="password" id="password" required></div>
      <label class="remember"><input type="checkbox" id="remember"> Keep me signed in</label>
      <button class="btn" id="btn" type="submit">Sign in</button>
    </form>
    <p class="foot">XplagiaX Admin · Confidential — authorized personnel only</p>
  </div>
</div>
<script>
const frm=document.getElementById('frm'),msg=document.getElementById('msg'),btn=document.getElementById('btn');
frm.addEventListener('submit', async e=>{
  e.preventDefault();
  msg.className='msg';
  btn.disabled=true;btn.textContent='Signing in…';
  try{
    const r=await fetch('/auth_bp/login',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:document.getElementById('email').value,
        password:document.getElementById('password').value,
        remember:document.getElementById('remember').checked})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok || !d.success) throw new Error(d.message || 'Invalid credentials.');
    window.location.href = d.redirect_url || '/adminx/';
  }catch(err){
    msg.className='msg err';msg.textContent=err.message;
    btn.disabled=false;btn.textContent='Sign in';
  }
});
</script>
</body>
</html>
