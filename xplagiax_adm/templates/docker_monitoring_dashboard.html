<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Contenedores Docker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #495057;
            line-height: 1.5;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e9ecef;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #212529;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            padding: 0 20px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            color: #6c757d;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: block;
            padding: 12px 20px;
            color: #495057;
            text-decoration: none;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #f8f9fa;
            color: #212529;
        }

        .nav-item.active {
            background: #e3f2fd;
            color: #1976d2;
            border-left-color: #1976d2;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 500;
            color: #212529;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1976d2;
            color: white;
        }

        .btn-primary:hover {
            background: #1565c0;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            border: 1px solid #e9ecef;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .stat-title {
            font-size: 16px;
            color: #212529;
            font-weight: 600;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .status-running {
            background: #d4edda;
            color: #155724;
        }

        .status-stopped {
            background: #f8d7da;
            color: #721c24;
        }

        .status-checking {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-running {
            background: #d4edda;
            color: #155724;
        }

        .badge-stopped {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-checking {
            background: #fff3cd;
            color: #856404;
        }

        .stat-details {
            margin-top: 16px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .detail-label {
            color: #6c757d;
        }

        .detail-value {
            font-weight: 500;
            color: #212529;
        }

        .last-check {
            font-size: 12px;
            color: #6c757d;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e9ecef;
        }

        /* Loading */
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1976d2;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .main-content {
                margin-left: 0;
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .refresh-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🐳 Docker Monitor</div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Monitoreo</div>
                    <a href="#" class="nav-item active">
                        📊 Dashboard
                    </a>
                    <a href="#" class="nav-item">
                        📋 Logs
                    </a>
                    <a href="#" class="nav-item">
                        ⚙️ Configuración
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Estado de Contenedores</h1>
                <div class="header-actions">
                    <div class="refresh-status">
                        <span id="refreshStatus">Actualizando...</span>
                        <div class="spinner" id="spinner"></div>
                    </div>
                    <button class="btn btn-primary" onclick="checkAllServices()">
                        🔄 Actualizar Todo
                    </button>
                </div>
            </div>

            <!-- Container Status Grid -->
            <div class="stats-grid" id="containersGrid">
                <!-- Los contenedores se generarán dinámicamente -->
            </div>
        </main>
    </div>

    <script>
        // Configuración de servicios a monitorear
        const services = [
            {
                name: 'ClamAV',
                container: 'clamav',
                endpoint: '/health/clamav',
                icon: '🛡️',
                description: 'Antivirus Scanner'
            },
            {
                name: 'Elasticsearch',
                container: 'elasticsearch',
                endpoint: '/health/elasticsearch',
                icon: '🔍',
                description: 'Search Engine'
            },
            {
                name: 'MinIO',
                container: 'minio',
                endpoint: '/health/minio',
                icon: '💾',
                description: 'Object Storage'
            },
            {
                name: 'Qdrant',
                container: 'qdrant',
                endpoint: '/health/qdrant',
                icon: '🎯',
                description: 'Vector Database'
            },
            {
                name: 'Redis',
                container: 'redis',
                endpoint: '/health/redis',
                icon: '⚡',
                description: 'Cache Database'
            },
            {
                name: 'RabbitMQ',
                container: 'rabbitmq',
                endpoint: '/health/rabbitmq',
                icon: '🐰',
                description: 'Message Broker'
            }
        ];

        // Estado de los servicios
        let serviceStatus = {};

        // Inicializar dashboard
        function initDashboard() {
            renderServices();
            checkAllServices();
            
            // Auto-refresh cada 30 segundos
            setInterval(checkAllServices, 30000);
        }

        // Renderizar tarjetas de servicios
        function renderServices() {
            const grid = document.getElementById('containersGrid');
            grid.innerHTML = '';

            services.forEach(service => {
                const card = createServiceCard(service);
                grid.appendChild(card);
            });
        }

        // Crear tarjeta de servicio
        function createServiceCard(service) {
            const div = document.createElement('div');
            div.className = 'stat-card';
            div.id = `card-${service.container}`;
            
            const status = serviceStatus[service.container] || { 
                status: 'checking', 
                uptime: 'N/A', 
                lastCheck: 'Nunca',
                responseTime: 'N/A'
            };

            div.innerHTML = `
                <div class="stat-header">
                    <div class="stat-title">${service.name}</div>
                    <div class="stat-icon status-${status.status}">
                        ${service.icon}
                    </div>
                </div>
                <div class="status-badge badge-${status.status}">
                    ${getStatusText(status.status)}
                </div>
                <div class="stat-details">
                    <div class="detail-item">
                        <span class="detail-label">Contenedor:</span>
                        <span class="detail-value">${service.container}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Descripción:</span>
                        <span class="detail-value">${service.description}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Tiempo Respuesta:</span>
                        <span class="detail-value">${status.responseTime}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Uptime:</span>
                        <span class="detail-value">${status.uptime}</span>
                    </div>
                </div>
                <div class="last-check">
                    Última verificación: ${status.lastCheck}
                </div>
            `;

            return div;
        }

        // Obtener texto del estado
        function getStatusText(status) {
            switch(status) {
                case 'running': return 'Ejecutándose';
                case 'stopped': return 'Detenido';
                case 'checking': return 'Verificando...';
                default: return 'Desconocido';
            }
        }

        // Verificar estado de un servicio
        async function checkService(service) {
            const startTime = Date.now();
            
            try {
                // Simular llamada a tu API Flask
                const response = await fetch(`/api${service.endpoint}`, {
                    method: 'GET',
                    timeout: 5000
                });
                
                const responseTime = Date.now() - startTime;
                const data = await response.json();
                
                serviceStatus[service.container] = {
                    status: response.ok ? 'running' : 'stopped',
                    uptime: data.uptime || 'N/A',
                    lastCheck: new Date().toLocaleTimeString(),
                    responseTime: `${responseTime}ms`
                };
                
            } catch (error) {
                // En caso de error, simular datos para demostración
                serviceStatus[service.container] = {
                    status: Math.random() > 0.3 ? 'running' : 'stopped',
                    uptime: Math.random() > 0.5 ? `${Math.floor(Math.random() * 24)}h ${Math.floor(Math.random() * 60)}m` : 'N/A',
                    lastCheck: new Date().toLocaleTimeString(),
                    responseTime: `${Math.floor(Math.random() * 200) + 50}ms`
                };
            }
        }

        // Verificar todos los servicios
        async function checkAllServices() {
            const spinner = document.getElementById('spinner');
            const refreshStatus = document.getElementById('refreshStatus');
            
            spinner.style.display = 'inline-block';
            refreshStatus.textContent = 'Actualizando...';
            
            // Verificar servicios en paralelo
            const promises = services.map(service => checkService(service));
            await Promise.all(promises);
            
            // Actualizar UI
            renderServices();
            
            spinner.style.display = 'none';
            refreshStatus.textContent = `Última actualización: ${new Date().toLocaleTimeString()}`;
        }

        // Inicializar cuando se carga la página
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
