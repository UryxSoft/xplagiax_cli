{% extends "user/user_base.html" %}
{% block content %}    

<link rel="stylesheet"   href="{{ url_for('static', filename='css/analysis_results.css') }}" />
<div class="scroll-indicator"></div>
<div class="result-main-container">
    <div class="document-panel">

        <div id="content">
        
        </div>

    </div>
    <div class="similarity-panel">
        <div class="similarity-header">              
            <div class="similarity-label">Overall Similarity</div>
        </div>

        <!-- AQUÍ VA EL SWITCH -->
        <div class="switch-container">
            <label class="switch">
                <input type="checkbox" id="highlight-toggle" checked>
                <span class="slider"></span>
            </label>
            <span class="switch-label" >Show all underlines</span>
            <div id="ai_global"></div>
    

        </div>

        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-button active" data-tab="matches">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                        <path d="M10.97 4.97a.235.235 0 0 0-.02.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z"/>
                    </svg>
                    Matches
                </button>
                <button class="tab-button" data-tab="references">

                        <path d="M6.354 5.5H4a3 3 0 0 0 0 6h3a3 3 0 0 0 2.83-4H9c-.086 0-.17.01-.25.031A2 2 0 0 1 7 10.5H4A2 2 0 1 1 4 6.5h2.354zM10 6a3 3 0 0 1 2.83 4h-.58c-.08 0-.16-.01-.25-.031A2 2 0 0 0 13 7.5h-3A2 2 0 1 0 10 11h2.646A3 3 0 0 1 10 6z"/>

                </button>
                <button class="tab-button" data-tab="citations">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">

    </div>
    
    <!-- Modal Sankey (debe estar ANTES del script) -->

        <div class="modal-content">
            <div class="modal-header">

            </div>
            <div class="modal-body">
                <div id="sankeyChart"></div>
            </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', async function() {
        // ========== VARIABLES GLOBALES AL INICIO ==========
        let highlightsVisible = true;
        let currentPage = 1;
        let totalPages = 0;
        let tooltipsAttached = false;
        
        // NUEVA: Variable global para almacenar términos encontrados con metadatos
        window.foundTermsGlobal = [];
        let foundTerms = []; // Para la lista de sidebar
        let termIdCounter = 0; // Contador único para IDs
        
        // NUEVO: Mapa para tracking de bloques con highlights
        const blocksWithHighlights = new Set();
        
        // NUEVO: Caché para optimización
        const spanMapCache = new Map();
        const MAX_CACHE_SIZE = 50;

        /// ========== RECUPERAR DATOS ==========
        const htmlFilePath = sessionStorage.getItem('htmlFilePath');
        const contentDiv = document.getElementById('content');
        const analysisResult = JSON.parse(sessionStorage.getItem('analysisResult'));

        console.log(analysisResult);
        
        if (!htmlFilePath) {
            contentDiv.innerHTML = '<p>No hay análisis disponible.</p>';
            return;
        }
        
        // ========== CARGAR CONTENIDO HTML ==========
        try {
            const fullUrl = `${window.location.origin}${htmlFilePath}`;
            console.log('Fetching from:', fullUrl);
            
            const response = await fetch(fullUrl);
            console.log('Response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const htmlContent = await response.text();
            contentDiv.innerHTML = htmlContent;
            
        } catch (error) {
            console.error('Error completo:', error);
            contentDiv.innerHTML = `<div class="xplag-error-container-main">Error: ${error.message}</div>`;
            return;
        }

        // ========== PROCESAR DATOS DE ANÁLISIS ==========
        
        // Database terms
        /*const term_db = (analysisResult.result_db || []).map(item => {
            const match = (item.matches && item.matches.length > 0) ? item.matches[0] : {};
            return {
                text: item.original || "",
                source: match.title || "",
                score: match.normalized_score !== undefined
                    ? match.normalized_score
                    : (match.score !== undefined ? match.score / 100 : 0)
            };
        });*/

        const term_db = (analysisResult.result_db || [])
            .reduce((acc, item) => {
                const match = (item.matches && item.matches.length > 0) ? item.matches[0] : {};
                const score = match.normalized_score ?? (match.score !== undefined ? match.score / 100 : 0);

                if (score > 0) {
                    acc.push({
                        text: item.original || "",
                        source: match.title || "",
                        score
                    });
                }
                return acc;
            }, []);


        // AI Generated terms
        const rawAiData = analysisResult.result_ai?.classified_paragraphs || [];
        const term_ai = [];
        let aiIndexCounter = 0;

        rawAiData.forEach((item, rawIndex) => {
            if (!item || item.is_human !== false) return;
            
            let textContent = '';
            let pageNum = null;
            let sentenceNum = null;
            
            if (Array.isArray(item.text) && item.text.length >= 3) {
                pageNum = item.text[0];
                sentenceNum = item.text[1];
                textContent = item.text[2] || '';
            } else if (typeof item.text === 'string') {
                textContent = item.text;
            } else if (item.text && typeof item.text === 'object' && item.text[2]) {
                textContent = item.text[2];
            }
            
            textContent = textContent.trim();
            if (textContent.length < 5) return;
            
            term_ai.push({
                originalIndex: rawIndex,
                aiIndex: aiIndexCounter++,
                text: textContent,
                score: item.confidence ? parseFloat((item.confidence / 100).toFixed(2)) : 0,
                aiModel: item.ai_model || 'unknown',
                textLength: textContent.length,
                pageNum: pageNum,
                sentenceNum: sentenceNum,
                rawItem: item
            });
        });

        // Human terms
        const rawHumanData = analysisResult.result_ai?.classified_paragraphs || [];
        const term_human = [];
        let humanIndexCounter = 0;

        rawHumanData.forEach((item, rawIndex) => {
            if (!item || item.is_human !== true) return;
            
            let textContent = '';
            let pageNum = null;
            let sentenceNum = null;
            
            if (Array.isArray(item.text) && item.text.length >= 3) {
                pageNum = item.text[0];
                sentenceNum = item.text[1];
                textContent = item.text[2] || '';
            } else if (typeof item.text === 'string') {
                textContent = item.text;
            } else if (item.text && typeof item.text === 'object' && item.text[2]) {
                textContent = item.text[2];
            }
            
            textContent = textContent.trim();
            if (textContent.length < 5) return;
            
            term_human.push({
                originalIndex: rawIndex,
                humanIndex: humanIndexCounter++,
                text: textContent,
                score: item.confidence ? parseFloat((item.confidence / 100).toFixed(2)) : 0,
                aiModel: item.ai_model || 'unknown',
                textLength: textContent.length,
                pageNum: pageNum,
                sentenceNum: sentenceNum,
                rawItem: item
            });
        });

        const term_web = [];
        const term_wikipedia = [];
        const term_arxiv = [];
        const term_pubmed = [];
        const term_openalex = [];

        const term_references = (analysisResult.urls || []).map(item => ({
            url: item || " ",
            title: item || " ",
            searchText: " "
        }));

        const term_images = (analysisResult.images || []).map(item => ({
            url: item || "",
            alt: ""
        }));

        const term_citations = [];

        // ========== CONFIGURACIÓN DE TÉRMINOS POR FUENTE ==========
        const sources = [
            { type: 'db', terms: term_db, color: '#8EC5FF', icon: 'database', label: 'Database' },
            { type: 'ai', terms: term_ai, color: '#FF2E51', icon: 'robot', label: 'AI Generated' },
            { type: 'human', terms: term_human, color: '#10b981', icon: 'people', label: 'Human' },
            { type: 'web', terms: term_web, color: '#FFD6A7', icon: 'globe', label: 'Web' },
            { type: 'wikipedia', terms: term_wikipedia, color: '#CAD5E2', icon: 'book', label: 'Wikipedia' },
            { type: 'arxiv', terms: term_arxiv, color: '#DAB2FF', icon: 'file-text', label: 'ArXiv' },
            { type: 'pubmed', terms: term_pubmed, color: '#FEF3C6', icon: 'heart-pulse', label: 'PubMed' },
            { type: 'openalex', terms: term_openalex, color: '#84ddd6', icon: 'graduation-cap', label: 'OpenAlex' }
        ];

        console.log('✅ Parte 1 cargada: Variables y datos procesados');

// ========== FUNCIÓN PRINCIPAL CORREGIDA ==========
function highlightTerm(term, source) {
    let textToFind = normalizeTextEnhanced(term.text.replace(/\n/g, ' '));
    if (!textToFind || textToFind.length < 5) return;

    const words = textToFind.split(/\s+/).filter(word => word.length > 0);
    if (words.length === 0) return;

    const allPages = document.querySelectorAll('.pdf-page');
    let foundAtLeastOnce = false;
    
    console.log(`🔍 Buscando: "${textToFind.substring(0, 60)}..."`);
    
    allPages.forEach(page => {
        const pageNumber = parseInt(page.id.replace('page-', '')) || 1;
        
        // ✅ ESTRATEGIA 1: Búsqueda en TODOS los spans (sin excluir)
        foundAtLeastOnce = searchInAllSpans(page, pageNumber, textToFind, words, term, source) || foundAtLeastOnce;
    });
    
    //  FALLBACK ESTRATÉGICO
    if (!foundAtLeastOnce) {
        console.log(`⚠️ Fallback para: "${textToFind.substring(0, 50)}..."`);
        
        // ESTRATEGIA 2: Búsqueda por segmentos
        if (words.length > 10) {
            const segments = createSearchSegments(words);
            
            segments.forEach(segment => {
                allPages.forEach(page => {
                    const pageNumber = parseInt(page.id.replace('page-', '')) || 1;
                    foundAtLeastOnce = searchInAllSpans(page, pageNumber, segment.text, segment.words, term, source) || foundAtLeastOnce;
                });
            });
        }
        
        // ESTRATEGIA 3: Búsqueda por bloques consecutivos
        if (!foundAtLeastOnce) {
            allPages.forEach(page => {
                const pageNumber = parseInt(page.id.replace('page-', '')) || 1;
                foundAtLeastOnce = searchConsecutiveBlocksEnhanced(page, pageNumber, textToFind, term, source) || foundAtLeastOnce;
            });
        }
    }
}

// ========== BÚSQUEDA EN TODOS LOS SPANS (CORREGIDA) ==========
function searchInAllSpans(page, pageNumber, textToFind, words, term, source) {
    //  CAMBIO CRÍTICO: Buscar en TODOS los spans, no excluir
    const allSpans = Array.from(page.querySelectorAll('.text-span'));
    if (allSpans.length === 0) return false;
    
    // Filtrar spans que ya tienen este término específico para evitar duplicados
    const spansToProcess = allSpans.filter(span => {
        const existingTermId = span.getAttribute('data-term-id');
        // Solo excluir si tiene exactamente el mismo término
        return !existingTermId || existingTermId !== term.id?.toString();
    });
    
    if (spansToProcess.length === 0) return false;
    
    // Construir texto completo
    let fullPageText = '';
    const spanMap = [];
    
    spansToProcess.forEach((span, idx) => {
        const text = span.textContent;
        const start = fullPageText.length;
        
        spanMap.push({
            span: span,
            start: start,
            end: start + text.length,
            text: text,
            block: span.closest('.text-block'),
            originalElement: span,
            isAlreadyHighlighted: span.classList.contains('highlight'),
            existingTermId: span.getAttribute('data-term-id'),
            existingSourceType: span.getAttribute('data-source-type')
        });
        
        fullPageText += text;
        
        // Agregar espacio entre spans
        if (idx < spansToProcess.length - 1) {
            const nextSpan = spansToProcess[idx + 1];
            const nextText = nextSpan.textContent;
            if (!nextText.match(/^[.,;:!?\)\]}]/)) {
                fullPageText += ' ';
            }
        }
    });
    
    const normalizedPage = normalizeTextEnhanced(fullPageText);
    const normalizedTarget = textToFind;
    
    const found = searchWithToleranceEnhanced(normalizedPage, normalizedTarget, words);
    
    if (!found) return false;
    
    const { matchStart, matchEnd, matchedText } = found;
    
    console.log(`✅ Match en page-${pageNumber}: "${matchedText.substring(0, 60)}..."`);
    
    const termId = termIdCounter++;
    
    const origStart = mapEnhancedPosition(fullPageText, normalizedPage, matchStart);
    const origEnd = mapEnhancedPosition(fullPageText, normalizedPage, matchEnd);
    
    if (origStart === -1 || origEnd === -1) {
        console.warn(`⚠️ Mapeo falló en page-${pageNumber}`);
        return false;
    }
    
    const affectedSpans = spanMap.filter(sp => 
        sp.start < origEnd && sp.end > origStart
    );
    
    if (affectedSpans.length === 0) {
        console.warn(`⚠️ No spans encontrados para el match`);
        return false;
    }
    
    console.log(`   📍 Afecta ${affectedSpans.length} spans/bloques`);
    
    const firstBlock = affectedSpans[0].block;
    let paragraphNumber = 1;
    
    if (firstBlock) {
        const allBlocks = page.querySelectorAll('.text-block');
        paragraphNumber = Array.from(allBlocks).indexOf(firstBlock) + 1;
    }
    
    affectedSpans.forEach(spanData => {
        highlightSpanEnhanced(spanData, origStart, origEnd, termId, source);
    });
    
    saveTermMetadata(termId, term, source, pageNumber, paragraphNumber);
    
    return true;
}

// ========== RESALTADO MEJORADO ==========
function highlightSpanEnhanced(spanData, matchStart, matchEnd, termId, source) {
    const { span, start, end, text, originalElement, isAlreadyHighlighted, existingTermId } = spanData;
    
    //  MANEJO DE SPANS YA RESALTADOS
    if (isAlreadyHighlighted) {
        // Si ya está resaltado con el MISMO término, no hacer nada
        if (existingTermId && existingTermId === termId.toString()) {
            return;
        }
        
        // Si está resaltado con OTRO término, agregar clase adicional
        highlightAlreadyHighlightedSpan(spanData, termId, source);
        return;
    }
    
    // Calcular intersección para span no resaltado
    const hlStart = Math.max(0, matchStart - start);
    const hlEnd = Math.min(text.length, matchEnd - start);
    
    // Validaciones
    if (hlStart >= hlEnd || hlEnd <= 0) return;
    if (hlStart < 0 || hlEnd > text.length) return;
    if (!span.parentNode) return;
    
    const before = text.substring(0, hlStart);
    const highlight = text.substring(hlStart, hlEnd);
    const after = text.substring(hlEnd);
    
    if (highlight.trim().length === 0) return;
    
    const parent = span.parentNode;
    
    // PRESERVAR ESTILOS ORIGINALES
    if (before) {
        const beforeSpan = originalElement.cloneNode(false);
        beforeSpan.textContent = before;
        beforeSpan.classList.remove('highlight');
        beforeSpan.removeAttribute('data-term-id');
        beforeSpan.removeAttribute('data-source-type');
        parent.insertBefore(beforeSpan, span);
    }
    
    const highlightSpan = originalElement.cloneNode(false);
    highlightSpan.textContent = highlight;
    highlightSpan.classList.add('highlight', `highlight-${source.type}`);
    highlightSpan.setAttribute('data-term-id', termId);
    highlightSpan.setAttribute('data-source-type', source.type);
    parent.insertBefore(highlightSpan, span);
    
    // Marcar bloque con highlight
    const block = highlightSpan.closest('.text-block');
    if (block) blocksWithHighlights.add(block);
    
    // Manejar span original
    if (after) {
        span.textContent = after;
        span.classList.remove('highlight');
        span.removeAttribute('data-term-id');
        span.removeAttribute('data-source-type');
    } else {
        parent.removeChild(span);
    }
}

// ========== MANEJO DE SPANS YA RESALTADOS ==========
function highlightAlreadyHighlightedSpan(spanData, termId, source) {
    const { span } = spanData;
    
    const existingTermId = span.getAttribute('data-term-id');
    
    // Si ya tiene el mismo término, no hacer nada
    if (existingTermId && existingTermId === termId.toString()) return;
    
    // Agregar la nueva clase de highlight manteniendo las existentes
    span.classList.add(`highlight-${source.type}`);
    
    // Si no tenía data-term-id, asignarle uno
    if (!existingTermId) {
        span.setAttribute('data-term-id', termId);
        span.setAttribute('data-source-type', source.type);
    } else {
        // Si ya tiene un término diferente, marcar como múltiple
        span.setAttribute('data-multiple-terms', 'true');
    }
    
    // Marcar bloque con highlight
    const block = span.closest('.text-block');
    if (block) blocksWithHighlights.add(block);
    
    console.log(`   🔄 Span ya resaltado - agregado highlight adicional: ${source.type}`);
}

// ========== BÚSQUEDA EN BLOQUES CONSECUTIVOS MEJORADA ==========
function searchConsecutiveBlocksEnhanced(page, pageNumber, textToFind, term, source) {
    const allBlocks = Array.from(page.querySelectorAll('.text-block'));
    const normalizedTarget = normalizeTextEnhanced(textToFind);
    
    // Buscar secuencias de bloques que contengan el texto
    for (let startBlock = 0; startBlock < allBlocks.length; startBlock++) {
        for (let endBlock = startBlock; endBlock < Math.min(startBlock + 6, allBlocks.length); endBlock++) {
            const blocks = allBlocks.slice(startBlock, endBlock + 1);
            
            // Construir texto de todos los spans en estos bloques
            let blockText = '';
            const blockSpans = [];
            
            blocks.forEach(block => {
                const spans = Array.from(block.querySelectorAll('.text-span'));
                spans.forEach(span => {
                    blockSpans.push({
                        span: span,
                        text: span.textContent,
                        block: block,
                        isAlreadyHighlighted: span.classList.contains('highlight')
                    });
                    blockText += span.textContent + ' ';
                });
            });
            
            const normalizedBlockText = normalizeTextEnhanced(blockText);
            
            if (normalizedBlockText.includes(normalizedTarget)) {
                console.log(`✅ Match en bloques consecutivos ${startBlock}-${endBlock} page-${pageNumber}`);
                
                const termId = termIdCounter++;
                let paragraphNumber = startBlock + 1;
                
                // Resaltar en todos los spans de la secuencia
                blockSpans.forEach(spanData => {
                    if (!spanData.span.parentNode) return;
                    
                    // Si ya está resaltado, agregar clase adicional
                    if (spanData.isAlreadyHighlighted) {
                        spanData.span.classList.add(`highlight-${source.type}`);
                        spanData.span.setAttribute('data-multiple-terms', 'true');
                    } else {
                        // Si no está resaltado, crear nuevo highlight
                        const highlightSpan = spanData.span.cloneNode(false);
                        highlightSpan.textContent = spanData.span.textContent;
                        highlightSpan.classList.add('highlight', `highlight-${source.type}`);
                        highlightSpan.setAttribute('data-term-id', termId);
                        highlightSpan.setAttribute('data-source-type', source.type);
                        
                        spanData.span.parentNode.insertBefore(highlightSpan, spanData.span);
                        spanData.span.parentNode.removeChild(spanData.span);
                    }
                    
                    const block = spanData.span.closest('.text-block');
                    if (block) blocksWithHighlights.add(block);
                });
                
                saveTermMetadata(termId, term, source, pageNumber, paragraphNumber);
                return true;
            }
        }
    }
    
    return false;
}

// ========== BÚSQUEDA CON TOLERANCIA MEJORADA ==========
function searchWithToleranceEnhanced(normalizedPage, normalizedTarget, words) {
    // Estrategia 1: Búsqueda exacta
    let exactIndex = normalizedPage.indexOf(normalizedTarget);
    if (exactIndex !== -1) {
        return {
            matchStart: exactIndex,
            matchEnd: exactIndex + normalizedTarget.length,
            matchedText: normalizedTarget
        };
    }
    
    // Estrategia 2: Búsqueda por palabras consecutivas (60% de palabras)
    const minWordsMatch = Math.max(2, Math.floor(words.length * 0.6));
    
    for (let start = 0; start <= words.length - minWordsMatch; start++) {
        for (let end = words.length; end >= start + minWordsMatch; end--) {
            const segmentWords = words.slice(start, end);
            const segmentText = segmentWords.join(' ');
            const segmentIndex = normalizedPage.indexOf(segmentText);
            
            if (segmentIndex !== -1 && segmentText.length > 10) {
                console.log(`   🔄 Match parcial (${segmentWords.length}/${words.length} palabras): "${segmentText}"`);
                return {
                    matchStart: segmentIndex,
                    matchEnd: segmentIndex + segmentText.length,
                    matchedText: segmentText
                };
            }
        }
    }
    
    // Estrategia 3: Búsqueda de palabras clave
    const stopWords = new Set(['the', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'a', 'an']);
    const keyWords = words.filter(word => word.length > 2 && !stopWords.has(word));
    
    if (keyWords.length >= 2) {
        let currentIndex = 0;
        let matchedKeywords = [];
        
        for (const keyword of keyWords) {
            const keywordIndex = normalizedPage.indexOf(keyword, currentIndex);
            if (keywordIndex === -1) break;
            
            matchedKeywords.push({ keyword, index: keywordIndex });
            currentIndex = keywordIndex + keyword.length;
        }
        
        if (matchedKeywords.length >= 2) {
            const firstMatch = matchedKeywords[0];
            const lastMatch = matchedKeywords[matchedKeywords.length - 1];
            const distance = lastMatch.index - firstMatch.index;
            
            if (distance < 400) {
                const matchedText = normalizedPage.substring(
                    firstMatch.index, 
                    lastMatch.index + lastMatch.keyword.length
                );
                console.log(`   🔄 Match por palabras clave: "${matchedText}"`);
                
                return {
                    matchStart: firstMatch.index,
                    matchEnd: lastMatch.index + lastMatch.keyword.length,
                    matchedText: matchedText
                };
            }
        }
    }
    
    return null;
}

       // ========== NORMALIZACIÓN MEJORADA ==========
function normalizeTextEnhanced(text) {
    return text
        .toLowerCase()
        .replace(/[\u2018\u2019]/g, "'")          // Comillas tipográficas simples
        .replace(/[\u201C\u201D]/g, '"')          // Comillas tipográficas dobles
        .replace(/\u2013/g, '-')                  // En dash (–)
        .replace(/\u2014/g, '--')                 // Em dash (—)
        .replace(/\u00A0/g, ' ')                  // Non-breaking space
        .replace(/\u200B/g, '')                   // Zero-width space
        .replace(/[\r\n\t]/g, ' ')                // Saltos de línea → espacio
        .replace(/\s+/g, ' ')                     // Colapsar espacios múltiples
        .replace(/[.,;:!?]/g, '')                 // Remover puntuación para matching más flexible
        .trim();
}

// ========== MAPEO MEJORADO DE POSICIONES ==========
function mapEnhancedPosition(original, normalized, normPos) {
    let origIdx = 0;
    let normIdx = 0;
    
    while (normIdx < normPos && origIdx < original.length) {
        const origChar = original[origIdx].toLowerCase();
        
        // Manejar caracteres especiales
        if (origChar.match(/[.,;:!?]/)) {
            // Los caracteres de puntuación se eliminan en la normalización
            origIdx++;
            continue;
        }
        
        // Manejar espacios
        if (/\s/.test(origChar)) {
            while (origIdx < original.length && /\s/.test(original[origIdx])) {
                origIdx++;
            }
            if (normIdx < normalized.length && normalized[normIdx] === ' ') {
                normIdx++;
            }
        } else {
            // Caracteres normales
            const normalizedChar = normalizeTextEnhanced(origChar);
            normIdx += normalizedChar.length;
            origIdx++;
        }
    }
    
    return origIdx <= original.length ? origIdx : -1;
}

// ========== FUNCIÓN showTooltip CORREGIDA ==========
function showTooltip(highlight, event) {
    const termId = highlight.getAttribute('data-term-id');
    const sourceType = highlight.getAttribute('data-source-type');
    const hasMultipleTerms = highlight.getAttribute('data-multiple-terms') === 'true';
    
    if (!termId || !sourceType) {
        console.error('❌ Highlight sin datos:', highlight);
        return;
    }
    
    //  CORRECCIÓN: Buscar el término correcto considerando múltiples términos
    let term;
    
    if (hasMultipleTerms) {
        // Si tiene múltiples términos, buscar el más relevante basado en el texto
        const highlightText = normalizeTextEnhanced(highlight.textContent);
        
        term = window.foundTermsGlobal?.find(t => {
            const termText = normalizeTextEnhanced(t.text);
            // Buscar coincidencia parcial en el texto del highlight
            return termText.includes(highlightText) || highlightText.includes(termText.substring(0, 20));
        });
        
        // Si no encuentra por texto, usar el primer término que coincida con el sourceType
        if (!term) {
            term = window.foundTermsGlobal?.find(t => 
                t.sourceType === sourceType && t.id === parseInt(termId)
            );
        }
    } else {
        // Búsqueda normal por ID
        term = window.foundTermsGlobal?.find(t => t.id === parseInt(termId));
    }
    
    if (!term) {
        console.warn('⚠️ Término no encontrado, buscando alternativas...');
        
        //  FALLBACK: Buscar por texto del highlight
        const highlightText = normalizeTextEnhanced(highlight.textContent);
        term = window.foundTermsGlobal?.find(t => {
            const termText = normalizeTextEnhanced(t.text);
            return termText.includes(highlightText) || highlightText.includes(termText.substring(0, 30));
        });
        
        if (!term) {
            tooltip.innerHTML = `
                <div class="tooltip-header" style="background: #e74c3c;">
                    <div class="tooltip-title">Término no encontrado</div>
                </div>
                <div class="tooltip-body">
                    <div class="tooltip-source">ID: ${termId}</div>
                    <div class="tooltip-source">Tipo: ${sourceType}</div>
                    <div class="tooltip-source">Texto: "${highlight.textContent.substring(0, 50)}..."</div>
                    <div style="margin-top: 8px; color: #7f8c8d; font-size: 11px;">
                        Total términos: ${window.foundTermsGlobal?.length || 0}
                    </div>
                </div>
            `;
        }
    }
    
    if (term) {
        const fullMetadata = {
            ...term.metadata,
            source: term.metadata?.source || term.sourceLabel,
            title: term.metadata?.title || term.sourceLabel,
            url: term.metadata?.url || null,
            score: term.score,
            aiModel: term.aiModel,
            text: term.text,
            //  AGREGAR: Información sobre múltiples términos
            hasMultipleTerms: hasMultipleTerms,
            actualTermId: term.id,
            displayedTermId: termId
        };
        
        tooltip.innerHTML = createEnhancedTooltip(fullMetadata, sourceType);
    }
    
    // Posicionamiento del tooltip (sin cambios)
    const rect = highlight.getBoundingClientRect();
    tooltip.style.display = 'block';
    tooltip.style.opacity = '0';

    const tooltipRect = tooltip.getBoundingClientRect();
    
    let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
    let top = rect.top - tooltipRect.height - 10;
    
    if (left < 10) left = 10;
    if (left + tooltipRect.width > window.innerWidth - 10) {
        left = window.innerWidth - tooltipRect.width - 10;
    }
    if (top < 10) {
        top = rect.bottom + 10;
    }
    
    tooltip.style.left = `${left + window.scrollX}px`;
    tooltip.style.top = `${top + window.scrollY}px`;
    
    setTimeout(() => {
        tooltip.style.opacity = '1';
    }, 10);
}

// ========== FUNCIÓN createEnhancedTooltip MEJORADA ==========
function createEnhancedTooltip(termData, sourceType) {
    const source = sources.find(s => s.type === sourceType);
    if (!source) {
        console.error('❌ Fuente no encontrada:', sourceType);
        return '<div>Error: Fuente no encontrada</div>';
    }
    
    const sections = [];
    
    //  AGREGAR: Indicador de múltiples términos
    const multipleTermsIndicator = termData.hasMultipleTerms ? 
        '<div style="background: #f39c12; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; margin-left: 8px; display: inline-block;">Múltiples términos</div>' : 
        '';
    
    sections.push(`
        <div class="tooltip-header" style="background: ${source.color};">
            <div class="tooltip-icon" style="background: white;">
                ${getSourceIcon(sourceType).replace('fill="currentColor"', `fill="${source.color}"`)}
            </div>
            <div class="tooltip-title">${source.label} ${multipleTermsIndicator}</div>
        </div>
    `);
    
    const bodyItems = [];
    
    //  AGREGAR: Información de debug para múltiples términos
    if (termData.hasMultipleTerms) {
        bodyItems.push(`
            <div class="tooltip-debug" style="background: #fff3cd; border-left: 3px solid #ffc107; padding: 6px 8px; margin-bottom: 8px; font-size: 10px; color: #856404;">
                <strong>⚠️ Múltiples términos detectados</strong><br>
                ID Mostrado: ${termData.displayedTermId}<br>
                ID Real: ${termData.actualTermId}
            </div>
        `);
    }
    
    if (termData.source) {
        bodyItems.push(`<div class="tooltip-source"><strong>Source:</strong> ${termData.source}</div>`);
    }
    
    if (termData.title && termData.title !== termData.source) {
        bodyItems.push(`<div class="tooltip-source"><strong>Title:</strong> ${termData.title}</div>`);
    }
    
    if (termData.url) {
        bodyItems.push(`
            <a href="${termData.url}" target="_blank" class="tooltip-link">
                <svg width="12" height="12" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M6.354 5.5H4a3 3 0 0 0 0 6h3a3 3 0 0 0 2.83-4H9q-.13 0-.25.031A2.5 2.5 0 0 1 7 10.5H4A2.5 2.5 0 0 1 4 5.5h2.354zM10 6a3 3 0 0 0-2.83 4h.58q.13 0 .25-.031A2.5 2.5 0 0 1 9 5.5h3A2.5 2.5 0 0 1 12 8a2.5 2.5 0 0 1-2 2.45v1.05A3.5 3.5 0 0 0 13 8a3.5 3.5 0 0 0-3-3.46V3.5h-1v1.04z"/>
                </svg>
                Ver fuente completa
            </a>
        `);
    }
    
    if (termData.score !== null && termData.score !== undefined) {
        const scorePercent = Math.round(termData.score * 100);
        const scoreColor = scorePercent > 80 ? '#27ae60' : scorePercent > 50 ? '#f39c12' : '#e74c3c';
        bodyItems.push(`
            <div class="tooltip-score" style="color: ${scoreColor};">
                <strong>Confidence:</strong> ${scorePercent}%
            </div>
        `);
    }
    
    if (termData.text) {
        const preview = termData.text.length > 80 ? 
            termData.text.substring(0, 150) + '...' : 
            termData.text;
        bodyItems.push(`
            <div class="tooltip-preview" style="margin-top: 8px; padding: 8px; background: #f8f9fa; border-radius: 4px; font-size: 11px; color: #555;">
                "${preview}"
            </div>
        `);
    }
    
    sections.push(`
        <div class="tooltip-body">
            ${bodyItems.join('')}
        </div>
    `);
    
    return sections.join('');
}


// ========== MEJORA EN EL MANEJO DE MÚLTIPLES TÉRMINOS ==========
function improveMultipleTermsHandling() {
    console.log('🔧 Mejorando manejo de múltiples términos...');
    
    // Para cada highlight con múltiples términos, intentar asignar el término correcto
    const multiTermHighlights = document.querySelectorAll('[data-multiple-terms="true"]');
    
    multiTermHighlights.forEach(highlight => {
        const currentTermId = highlight.getAttribute('data-term-id');
        const sourceType = highlight.getAttribute('data-source-type');
        const highlightText = normalizeTextEnhanced(highlight.textContent);
        
        // Buscar el término que mejor coincida con el texto
        const matchingTerms = window.foundTermsGlobal.filter(term => 
            term.sourceType === sourceType && 
            normalizeTextEnhanced(term.text).includes(highlightText)
        );
        
        if (matchingTerms.length > 0) {
            // Ordenar por longitud de coincidencia (la más específica primero)
            matchingTerms.sort((a, b) => b.text.length - a.text.length);
            
            const bestMatch = matchingTerms[0];
            
            // Si el término actual no es el mejor match, actualizarlo
            if (bestMatch.id !== parseInt(currentTermId)) {
                highlight.setAttribute('data-term-id', bestMatch.id);
                console.log(`   🔄 Actualizado highlight: ${currentTermId} → ${bestMatch.id}`);
            }
        }
    });
}

            updateNavigationButtons();
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
                        const pageNumber = parseInt(entry.target.id.replace('page-', ''));
                        if (currentPage !== pageNumber) {
                            currentPage = pageNumber;
                            updatePageInfo();
                            updateNavigationButtons();
                        }
                    }
                });
            }, { threshold: 0.5 });
            
            pages.forEach(page => observer.observe(page));
        }

        function calculateStats_() {

            allPages.forEach(page => {
                const textBlocks = Array.from(page.querySelectorAll('.text-block'));
                
                textBlocks.forEach((block) => {
                    const spans = block.querySelectorAll('.text-span');
                    let hasValidText = false;
                    
                    spans.forEach(span => {

                            hasValidText = true;
                        }
                    });
                    
                    if (hasValidText) {
                        totalValidBlocks++;
                    }
                });
            });
            
            const statsBySource = {};
            sources.forEach(source => {
                statsBySource[source.type] = {
                    count: 0,
                    label: source.label,
                    color: source.color
                };
            });
            
            foundTerms.forEach(term => {
                if (statsBySource[term.sourceType]) {
                    statsBySource[term.sourceType].count++;
                }
            });
            
            return {
                statsBySource,
                blocksWithoutMatches: totalValidBlocks - blocksWithHighlights.size,

        // ========== CALCULAR ESTADÍSTICAS CORREGIDAS ==========
function calculateStats() {
    const allPages = document.querySelectorAll('.pdf-page');
    let totalValidBlocks = 0;
    let blocksWithMatches = 0;
    
    // 🔥 CORRECCIÓN: Contar bloques válidos y bloques con matches de forma consistente
    allPages.forEach(page => {
        const textBlocks = Array.from(page.querySelectorAll('.text-block'));
        
        textBlocks.forEach((block) => {
            const spans = block.querySelectorAll('.text-span');
            let hasValidText = false;
            let blockHasMatches = false;
            
            spans.forEach(span => {
                if (span.textContent.trim().length > 10) {
                    hasValidText = true;
                }
                if (span.classList.contains('highlight')) {
                    blockHasMatches = true;
                }
            });
            
            if (hasValidText) {
                totalValidBlocks++;
                if (blockHasMatches) {
                    blocksWithMatches++;
                }
            }
        });
    });
    
    console.log('🔍 CALCULO ESTADÍSTICAS:', {
        totalValidBlocks,
        blocksWithMatches,
        blocksWithHighlightsSize: blocksWithHighlights.size,
        foundTermsCount: foundTerms.length
    });
    
    const statsBySource = {};
    sources.forEach(source => {
        statsBySource[source.type] = {
            count: 0,
            label: source.label,
            color: source.color
        };
    });
    
    foundTerms.forEach(term => {
        if (statsBySource[term.sourceType]) {
            statsBySource[term.sourceType].count++;
        }
    });
    
    return {
        statsBySource,
        blocksWithoutMatches: totalValidBlocks - blocksWithMatches,
        totalTextBlocks: totalValidBlocks,
        totalTermsFound: blocksWithMatches // 🔥 CORRECCIÓN: Usar blocksWithMatches en lugar de blocksWithHighlights.size
    };
}

                `;
                legendContainer.appendChild(legendItem);
            });
        }

        // Evento de doble click en el donut para Sankey
        setTimeout(() => {
            const chartCanvas = document.getElementById('similarityChart');
            if (chartCanvas) {
                chartCanvas.addEventListener('dblclick', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const rect = this.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
                    const innerRadius = Math.min(centerX, centerY) * 0.7;
                    
                    if (distance < innerRadius) {
                        openSankeyModal();
                    }
                });
            }
        }, 1000);

        // Botón alternativo - 🔥 CORRECCIÓN: Ajustar posición para el nuevo tamaño

            sankeyButton.addEventListener('click', function(e) {
                e.preventDefault();
                openSankeyModal();
            });
            
            chartContainer.style.position = 'relative';
            chartContainer.appendChild(sankeyButton);
        }

                            e.preventDefault();
                            e.stopPropagation();
                            
                            const rect = this.getBoundingClientRect();
                            const x = e.clientX - rect.left;
                            const y = e.clientY - rect.top;
                            const centerX = rect.width / 2;
                            const centerY = rect.height / 2;
                            
                            const distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));

        function drawSankeyChart() {
            if (typeof google === 'undefined' || !google.visualization) {
                console.error('❌ Google Charts no disponible');
                return;
            }

            //  CORRECCIÓN CRÍTICA: Contar BLOQUES por fuente, no términos
            const blocksBySource = {};
            sources.forEach(source => {
                blocksBySource[source.type] = new Set();
            });

            // Recorrer TODOS los bloques con highlights y contar por fuente
            const allBlocks = document.querySelectorAll('.text-block');
            let totalValidBlocks = 0;
            let blocksWithHighlightsCount = 0;

            allBlocks.forEach(block => {
                const spans = block.querySelectorAll('.text-span');
                let hasValidText = false;
                
                spans.forEach(span => {
                    if (span.textContent.trim().length > 10) {
                        hasValidText = true;
                    }
                });
                
                if (hasValidText) {
                    totalValidBlocks++;
                    
                    const highlights = block.querySelectorAll('.highlight');
                    if (highlights.length > 0) {
                        blocksWithHighlightsCount++;
                        
                        // Para CADA bloque con highlights, registrar TODAS sus fuentes
                        highlights.forEach(highlight => {
                            const sourceType = highlight.getAttribute('data-source-type');
                            if (sourceType && blocksBySource[sourceType]) {
                                blocksBySource[sourceType].add(block);
                            }
                        });
                    }
                }
            });

            console.log('🔍 SANKEY - Bloques reales por fuente:');
            const blocksCountBySource = {};
            sources.forEach(source => {
                const count = blocksBySource[source.type].size;
                blocksCountBySource[source.type] = {
                    count: count,
                    label: source.label,
                    color: source.color
                };
                console.log(`   ${source.label}: ${count} bloques`);
            });

            const blocksWithoutMatches = totalValidBlocks - blocksWithHighlightsCount;
            const matchPercent = totalValidBlocks > 0 ? ((blocksWithHighlightsCount / totalValidBlocks) * 100).toFixed(1) : '0';
            const noMatchPercent = totalValidBlocks > 0 ? ((blocksWithoutMatches / totalValidBlocks) * 100).toFixed(1) : '0';

            console.log('🔍 SANKEY - Resumen real:', {
                totalValidBlocks,
                blocksWithHighlightsCount,
                blocksWithoutMatches,
                matchPercent,
                noMatchPercent,
                foundTermsCount: foundTerms.length
            });

            const data = new google.visualization.DataTable();
            data.addColumn('string', 'From');
            data.addColumn('string', 'To');
            data.addColumn('number', 'Weight');
            data.addColumn({type: 'string', role: 'tooltip', p: {html: true}});
            
            //  CORRECCIÓN: Usar colores EXACTOS de las fuentes
            const nodeColors = [];
            const nodeMap = new Map();
            
            const registerNode = (nodeName, color) => {
                if (!nodeMap.has(nodeName)) {
                    nodeMap.set(nodeName, nodeColors.length);
                    nodeColors.push(color);
                }
            };
            
            // Registrar nodos principales
            registerNode(`Total (${totalValidBlocks})`, '#95a5a6');
            
            if (blocksWithHighlightsCount > 0) {
                registerNode(`With Matches Found (${blocksWithHighlightsCount})`, '#bdc3c7');
            }
            
            if (blocksWithoutMatches > 0) {
                registerNode(`Original Content (${blocksWithoutMatches})`, '#7f8c8d');
            }
            
            //  CORRECCIÓN: Registrar CADA fuente que tenga BLOQUES (no términos)
            sources.forEach(source => {
                const count = blocksCountBySource[source.type].count;
                if (count > 0) {
                    registerNode(`${source.label} (${count})`, source.color);
                }
            });
            
            //  CORRECCIÓN: Conexiones desde Total usando BLOQUES reales
            if (blocksWithHighlightsCount > 0) {
                data.addRow([
                    `Total (${totalValidBlocks})`,
                    `With Matches Found (${blocksWithHighlightsCount})`,
                    blocksWithHighlightsCount,
                    `<div style="padding:10px; font-family:Arial; min-width:180px;">
                        <strong style="color:#2ecc71;">With Matches Found</strong><br/>
                        <span style="font-size:20px; font-weight:bold;">${blocksWithHighlightsCount}</span> bloques<br/>
                        <span style="color:#7f8c8d;">${matchPercent}% del total</span>
                        <div style="margin-top:6px; font-size:11px; color:#95a5a6;">
                            (${foundTerms.length} términos distribuidos)
                        </div>
                    </div>`
                ]);
            }
            
            if (blocksWithoutMatches > 0) {
                data.addRow([
                    `Total (${totalValidBlocks})`,
                    `Original Content (${blocksWithoutMatches})`,
                    blocksWithoutMatches,
                    `<div style="padding:10px; font-family:Arial; min-width:180px;">
                        <strong style="color:#95a5a6;">Original Content</strong><br/>
                        <span style="font-size:20px; font-weight:bold;">${blocksWithoutMatches}</span> blocks<br/>
                        <span style="color:#7f8c8d;">${noMatchPercent}% of the total</span>
                    </div>`
                ]);
            }
            
            //  CORRECCIÓN CRÍTICA: Conexiones desde "Con Coincidencias" a CADA fuente usando BLOQUES
            let totalSourceBlocks = 0;
            sources.forEach(source => {
                const count = blocksCountBySource[source.type].count;
                if (count > 0) {
                    totalSourceBlocks += count;
                    
                    const sourcePercent = blocksWithHighlightsCount > 0 ? ((count / blocksWithHighlightsCount) * 100).toFixed(1) : '0';
                    const termCount = foundTerms.filter(term => term.sourceType === source.type).length;
                    
                    data.addRow([
                        `With Matches Found (${blocksWithHighlightsCount})`,
                        `${source.label} (${count})`,
                        count,
                        `<div style="padding:10px; font-family:Arial; min-width:220px;">
                            <div style="width:16px; height:16px; background:${source.color}; display:inline-block; border-radius:3px; margin-right:8px;"></div>
                            <strong>${source.label}</strong><br/>
                            <span style="font-size:20px; font-weight:bold;">${count}</span> blocks<br/>
                            <span style="color:#7f8c8d;">${sourcePercent}% from blocks with matches</span>
                            <div style="margin-top:4px; font-size:11px; color:#95a5a6;">
                                (${termCount} specialized terms)
                            </div>
                        </div>`
                    ]);
                }
            });
            
            //  VERIFICACIÓN: Mostrar si hay bloques con múltiples fuentes
            console.log('🔍 SANKEY - Verificación final:', {
                blocksWithHighlightsCount,
                totalSourceBlocks,
                diferencia: totalSourceBlocks - blocksWithHighlightsCount,
                bloquesConMultiplesFuentes: totalSourceBlocks - blocksWithHighlightsCount
            });
            
            const options = {
                width: '100%',
                height: 450,
                sankey: {
                    node: {
                        colors: nodeColors,
                        label: {
                            fontName: 'Arial',
                            fontSize: 12,
                            color: '#2c3e50',
                            bold: true
                        },
                        nodePadding: 20,
                        width: 15,
                        interactivity: true
                    },
                    link: {
                        colorMode: 'gradient',
                        colors: nodeColors,
                        fillOpacity: 0.8
                    }
                },
                tooltip: {
                    isHtml: true
                }
            };
            
            const container = document.getElementById('sankeyChart');
            if (!container) {
                console.error('❌ Contenedor sankeyChart no encontrado');
                return;
            }
            
            container.innerHTML = `
                <div style="text-align:center; padding:15px; background:#f8f9fa; border-bottom:1px solid #dee2e6;">
                    <h4 style="margin:0; color:#2c3e50;">Block Distribution by Source</h4>
                    <p style="margin:5px 0 0 0; color:#6c757d; font-size:14px;">
                        ${totalValidBlocks} blocks • ${blocksWithHighlightsCount} with matches (${matchPercent}%) • ${foundTerms.length} terms found
                    </p>
                    ${(totalSourceBlocks > blocksWithHighlightsCount) ? 
                        `<p style="margin:3px 0 0 0; color:#e67e22; font-size:12px;">
                            ⚠️ Some blocks contain multiple sources
                        </p>` : ''
                    }
                </div>
                <div id="sankeyChartCanvas" style="width:100%; height:550px;"></div>
            `;
            
            try {
                const chartContainer = document.getElementById('sankeyChartCanvas');
                const sankeyChart = new google.visualization.Sankey(chartContainer);
                sankeyChart.draw(data, options);
                console.log('✅ Gráfico Sankey dibujado correctamente');
            } catch (error) {
                console.error('❌ Error al dibujar Sankey:', error);
                container.innerHTML += `
                    <div style="text-align:center; padding:20px; color:#dc3545;">
                        <p>Error al generar el gráfico: ${error.message}</p>
                    </div>
                `;
            }
        }
  
        // ========== OTRAS FUNCIONES DE INICIALIZACIÓN ==========
        function initializeTabs() {
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabPanels = document.querySelectorAll('.tab-panel');
            
            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const targetTab = button.getAttribute('data-tab');
                    
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    tabPanels.forEach(panel => panel.classList.remove('active'));
                    
                    button.classList.add('active');
                    document.getElementById(`tab-${targetTab}`).classList.add('active');
                });
            });
        }

        function populateReferences() {

                card.className = 'reference-card';
                
                card.innerHTML = `

                container.appendChild(card);

        function populateImages() {
            const container = document.getElementById('imageslist');

            container.innerHTML = '';
            
            if (term_images.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #7f8c8d;">No images found</div>';
                return;

            term_images.forEach((img) => {

                    <img src="${img.url}" alt="${img.alt || 'Image'}" class="image-preview" loading="lazy">

                container.appendChild(card);

        function hideEmptyTabs() {
            const tabsConfig = [
                { id: 'matches', hasData: foundTerms.length > 0 },
                { id: 'references', hasData: term_references.length > 0 },
                { id: 'citations', hasData: term_citations.length > 0 },
                { id: 'images', hasData: term_images.length > 0 }
            ];
            
            tabsConfig.forEach(config => {
                const tabButton = document.querySelector(`[data-tab="${config.id}"]`);
                const tabPanel = document.getElementById(`tab-${config.id}`);
                
                if (!config.hasData) {
                    if (tabButton) tabButton.style.display = 'none';
                    if (tabPanel) tabPanel.style.display = 'none';
                } else {
                    if (tabButton) tabButton.style.display = '';
                    if (tabPanel) tabPanel.style.display = '';
                }
            });
            
            const firstVisibleTab = document.querySelector('.tab-button:not([style*="display: none"])');
            if (firstVisibleTab) {
                firstVisibleTab.click();
            }
        }

            setTimeout(() => {

            //console.log(`📄 Páginas totales: ${totalPages}`);
            //console.log(`🎯 Bloques con highlights: ${blocksWithHighlights.size}`);
            
        }, 300);
