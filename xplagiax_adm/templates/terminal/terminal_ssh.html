
<!-- templates/sessions_list.html -->
{% extends "base/adm_base.html" %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/document1.css') }}" />

<div class="main-content" id="mainContent">
    <div class="page-header">
        <h1 class="page-title">
            <i class="fas fa-server"></i> Sesiones SSH
        </h1>
        <div class="header-actions">
            <button class="btn btn-primary" id="newSessionBtn">
                <i class="bi bi-plus-square"></i> Nueva Sesión
            </button>
            <button class="btn btn-secondary" id="refreshBtn">
                <i class="bi bi-arrow-clockwise"></i> Actualizar
            </button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="bi bi-server"></i>
            </div>
            <div class="stat-content">
                <h3 id="totalSessions">0</h3>
                <p>Total Sesiones</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon active">
                <i class="bi bi-plug"></i>
            </div>
            <div class="stat-content">
                <h3 id="activeSessions">0</h3>
                <p>Sesiones Activas</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="bi bi-clock"></i>
            </div>
            <div class="stat-content">
                <h3 id="recentSessions">0</h3>
                <p>Usadas Hoy</p>
            </div>
        </div>
    </div>

    <div class="filters-section">
        <div class="filters-grid">
             <div class="filter-group">

             </div>
              <div class="filter-group"></div>
            <div class="filter-group">
                <i class="fas fa-search"></i>
                <input class="filter-input" type="text" id="searchInput" placeholder="Buscar sesiones...">
            </div>
            <div class="filter-group">
                <select id="statusFilter" class="filter-input">
                    <option value="">Todas</option>
                    <option value="active">Activas</option>
                    <option value="inactive">Inactivas</option>
                </select>
            </div>
        </div>
     </div>

    <!-- Sessions Table -->
    <div class="table-container">
        <div class="table-header">
            <div class="table-title">
                <i class="fas fa-list"></i> Sesiones Guardadas
            </div>
        
        </div>
        
        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>
                            <i class="bi bi-tag"></i> Nombre
                        </th>
                        <th>
                            <i class="bi bi-server"></i> Servidor
                        </th>
                        <th>
                            <i class="bi bi-user"></i> Usuario
                        </th>
                        <th>
                            <i class="bi bi-shield-alt"></i> Autenticación
                        </th>
                        <th>
                            <i class="bi bi-signal"></i> Estado
                        </th>
                        <th>
                            <i class="bi bi-clock"></i> Último Uso
                        </th>
                        <th>
                            <i class="bi bi-cogs"></i> Acciones
                        </th>
                    </tr>
                </thead>
                <tbody id="sessionsList">
                    <tr id="loadingRow">
                        <td colspan="7" class="loading-cell">
                            <div class="loading-spinner">
                                <i class="fas fa-spinner fa-spin"></i>
                                <span>Cargando sesiones...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Nueva Sesión -->
    <div class="modal" id="sessionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="bi bi-plus"></i> Nueva Sesión SSH</h2>
                <button class="close-btn" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="sessionForm">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name" class="form-label">Nombre de la Sesión *</label>
                            <input type="text" class="form-input" id="name" name="name" required 
                                   placeholder="Servidor de producción">
                        </div>
                        <div class="form-group">
                            <label for="hostname" class="form-label">Servidor (IP/Dominio) *</label>
                            <input type="text" class="form-input" id="hostname" name="hostname" required 
                                   placeholder="192.168.1.100">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="port" class="form-label">Puerto</label>
                            <input type="number" class="form-input" id="port" name="port" value="22" 
                                   min="1" max="65535">
                        </div>
                        <div class="form-group">
                            <label for="username" class="form-label">Usuario *</label>
                            <input type="text" class="form-input" id="username" name="username" required 
                                   placeholder="root">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="authTypeSelect" class="form-label">Tipo de Autenticación</label>
                        <select class="form-select" id="authTypeSelect" name="auth_type">
                            <option value="password">Contraseña</option>
                            <option value="key">Clave SSH</option>
                        </select>
                    </div>
                    
                    <div id="passwordGroup" class="form-group">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-input" id="password" name="password" 
                               placeholder="Ingresa la contraseña">
                    </div>
                    
                    <div id="keyGroup" class="form-group" style="display: none;">
                        <label for="key_path" class="form-label">Ruta de la Clave Privada</label>
                        <input type="text" class="form-input" id="key_path" name="key_path" 
                               placeholder="/home/user/.ssh/id_rsa">
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="testConnectionBtn">
                        <i class="bi bi-plug"></i> Probar Conexión
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">
                        <i class="bi bi-x-square"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary" id="saveSessionBtn">
                        <i class="bi bi-save"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Elements
    const newSessionBtn = document.getElementById('newSessionBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const sessionModal = document.getElementById('sessionModal');
    const closeModal = document.getElementById('closeModal');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveSessionBtn = document.getElementById('saveSessionBtn');
    const testConnectionBtn = document.getElementById('testConnectionBtn');
    const sessionForm = document.getElementById('sessionForm');
    const authTypeSelect = document.getElementById('authTypeSelect');
    const passwordGroup = document.getElementById('passwordGroup');
    const keyGroup = document.getElementById('keyGroup');
    const sessionsList = document.getElementById('sessionsList');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');

    let allSessions = [];

    // Modal controls
    newSessionBtn.addEventListener('click', () => {
        sessionModal.classList.add('show');
    });

    closeModal.addEventListener('click', closeSessionModal);
    cancelBtn.addEventListener('click', closeSessionModal);

    sessionModal.addEventListener('click', (e) => {
        if (e.target === sessionModal) {
            closeSessionModal();
        }
    });

    function closeSessionModal() {
        sessionModal.classList.remove('show');
        sessionForm.reset();
        authTypeSelect.dispatchEvent(new Event('change'));
    }

    // Toggle auth method fields
    authTypeSelect.addEventListener('change', () => {
        if (authTypeSelect.value === 'password') {
            passwordGroup.style.display = 'block';
            keyGroup.style.display = 'none';
            document.getElementById('password').required = true;
            document.getElementById('key_path').required = false;
        } else {
            passwordGroup.style.display = 'none';
            keyGroup.style.display = 'block';
            document.getElementById('password').required = false;
            document.getElementById('key_path').required = true;
        }
    });

    // Utility functions
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        `;
        
        if (type === 'success') {
            notification.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            notification.innerHTML = `<i class="bi bi-check-circle"></i> ${message}`;
        } else {
            notification.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
            notification.innerHTML = `<i class="bi bi-exclamation-triangle"></i> ${message}`;
        }
        
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.opacity = '1';
            notification.style.transform = 'translateX(0)';
        }, 100);
        
        setTimeout(() => {
            notification.style.opacity = '0';
            notification.style.transform = 'translateX(100%)';
            setTimeout(() => {
                if (document.body.contains(notification)) {
                    document.body.removeChild(notification);
                }
            }, 300);
        }, 4000);
    }

    function validateForm(data) {
        if (!data.name || !data.hostname || !data.username) {
            showNotification('Por favor, completa todos los campos requeridos', 'error');
            return false;
        }
        
        if (data.auth_type === 'password' && !data.password) {
            showNotification('Por favor, ingresa la contraseña', 'error');
            return false;
        }
        
        if (data.auth_type === 'key' && !data.key_path) {
            showNotification('Por favor, ingresa la ruta de la clave privada', 'error');
            return false;
        }
        
        return true;
    }

    function formatDate(dateStr) {
        if (!dateStr) return 'Nunca';
        const date = new Date(dateStr);
        const now = new Date();
        const diffTime = Math.abs(now - date);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays === 1) return 'Hoy';
        if (diffDays === 2) return 'Ayer';
        if (diffDays <= 7) return `Hace ${diffDays} días`;
        
        return date.toLocaleDateString('es-ES', { 
            day: '2-digit', 
            month: '2-digit', 
            year: 'numeric' 
        });
    }

    function updateStats() {
        const total = allSessions.length;
        const active = allSessions.filter(s => s.is_active).length;
        const today = new Date().toDateString();
        const recent = allSessions.filter(s => {
            if (!s.last_used_at) return false;
            return new Date(s.last_used_at).toDateString() === today;
        }).length;

        document.getElementById('totalSessions').textContent = total;
        document.getElementById('activeSessions').textContent = active;
        document.getElementById('recentSessions').textContent = recent;
    }

    function renderSessions(sessions = allSessions) {
        if (sessions.length === 0) {
            sessionsList.innerHTML = `
                <tr>
                    <td colspan="7" class="empty-state">
                        <i class="fas fa-server"></i>
                        <p>No hay sesiones guardadas</p>
                        <small>Crea tu primera sesión SSH para comenzar</small>
                    </td>
                </tr>
            `;
            return;
        }

        sessionsList.innerHTML = sessions.map(session => `
            <tr class="session-row" data-id="${session.id}">
                <td class="session-name">
                    <i class="fas fa-tag"></i>
                    <span>${session.name}</span>
                </td>
                <td class="session-server">
                    <span class="server-info">${session.hostname}:${session.port}</span>
                </td>
                <td class="session-user">
                    <i class="fas fa-user"></i>
                    <span>${session.username}</span>
                </td>
                <td class="session-auth">
                    <span class="auth-badge ${session.auth_type || 'password'}">
                        <i class="fas fa-${session.auth_type === 'key' ? 'key' : 'lock'}"></i>
                        ${session.auth_type === 'key' ? 'Clave SSH' : 'Contraseña'}
                    </span>
                </td>
                <td class="session-status">
                    <span class="status-badge ${session.is_active ? 'active' : 'inactive'}">
                        <i class="fas fa-circle"></i>
                        ${session.is_active ? 'Activa' : 'Inactiva'}
                    </span>
                </td>
                <td class="session-last-used">
                    <span class="last-used">${formatDate(session.last_used_at)}</span>
                </td>
                <td class="session-actions">
                    <button class="btn btn-success btn-sm connect-btn" data-id="${session.id}" 
                            ${session.is_active ? 'disabled' : ''}>
                        <i class="bi bi-plug"></i> Conectar
                    </button>
                    
                    <button class="btn btn-success btn-sm disconnect-btn" data-id="(${session.id})">
                        <i class="bi bi-plug"></i> Desonectar
                    </button>
                    <button class="btn btn-danger btn-sm delete-btn" data-id="${session.id}">
                        <i class="bi bi-trash"></i>Borrar
                    </button>
                </td>
            </tr>
        `).join('');

        // Add event listeners to buttons
        document.querySelectorAll('.connect-btn').forEach(btn => {
            btn.addEventListener('click', connectToSession);
        });

        document.querySelectorAll('.disconnect-btn').forEach(btn => {
            btn.addEventListener('click', disconnectToSession);
        }); 
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', deleteSession);
        });
    }

    function filterSessions() {
        const searchTerm = searchInput.value.toLowerCase();
        const statusFilter_ = statusFilter.value;
        
        let filtered = allSessions;
        
        if (searchTerm) {
            filtered = filtered.filter(session => 
                session.name.toLowerCase().includes(searchTerm) ||
                session.hostname.toLowerCase().includes(searchTerm) ||
                session.username.toLowerCase().includes(searchTerm)
            );
        }
        
        if (statusFilter_) {
            filtered = filtered.filter(session => {
                if (statusFilter_ === 'active') return session.is_active;
                if (statusFilter_ === 'inactive') return !session.is_active;
                return true;
            });
        }
        
        renderSessions(filtered);
    }

    // Event listeners for filtering
    searchInput.addEventListener('input', filterSessions);
    statusFilter.addEventListener('change', filterSessions);

    // Load sessions
    async function loadSessions() {
        try {
            const response = await fetch('/sessionsssh_bp/api/sessions');
            if (!response.ok) throw new Error('Failed to load sessions');
            
            allSessions = await response.json();
            renderSessions();
            updateStats();
        } catch (error) {
            console.error('Error loading sessions:', error);
            showNotification('Error al cargar las sesiones', 'error');
        }
    }

    // Connect to session
    async function connectToSession(e) {
        const sessionId = e.target.closest('.connect-btn').getAttribute('data-id');
        const btn = e.target.closest('.connect-btn');
        const originalHtml = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
        
        try {
            const response = await fetch(`/sessionsssh_bp/api/sessions/${sessionId}/connect`, {
                method: 'POST'
            });
            
            if (response.ok) {
                const data = await response.json();
                window.location.href = data.terminal_url;
            } else {
                throw new Error('Failed to connect');
            }
        } catch (error) {
            showNotification('Error al conectar con la sesión', 'error');
            btn.disabled = false;
            btn.innerHTML = originalHtml;
        }
    }

    // Connect to session
    async function disconnectToSession(e) {
        const sessionId = e.target.closest('.disconnect-btn').getAttribute('data-id');
        const btn = e.target.closest('.disconnect-btn');
        const originalHtml = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> desconectando...';
        
        //try {
            // Ejemplo de cómo usar el endpoint desde JavaScript
            fetch(`/sessionsssh_bp/api/sessions/${sessionId}/disconnect`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('Session disconnected successfully');
                    // Actualizar UI
                } else {
                    console.error('Error disconnecting session:', data.message);
                }
            });
        //} catch (error) {
        //    showNotification('Error al conectar con la sesión', 'error');
        //   btn.disabled = false;
        //    btn.innerHTML = originalHtml;
       // }
    }


    // Delete session
    async function deleteSession(e) {
        const sessionId = e.target.closest('.delete-btn').getAttribute('data-id');
        const sessionRow = e.target.closest('.session-row');
        const sessionName = sessionRow.querySelector('.session-name span').textContent;
        
        if (!confirm(`¿Estás seguro de eliminar la sesión "${sessionName}"?`)) return;
        
        try {
            const response = await fetch(`/sessionsssh_bp/api/sessions/${sessionId}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                showNotification('Sesión eliminada exitosamente', 'success');
                loadSessions();
            } else {
                throw new Error('Failed to delete session');
            }
        } catch (error) {
            showNotification('Error al eliminar la sesión', 'error');
        }
    }

    // Test connection
    testConnectionBtn.addEventListener('click', async () => {
        const formData = new FormData(sessionForm);
        const data = Object.fromEntries(formData.entries());
        
        if (!validateForm(data)) return;
        
        const originalHtml = testConnectionBtn.innerHTML;
        testConnectionBtn.disabled = true;
        testConnectionBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Probando...';
        
        try {
            const response = await fetch('/sessionsssh_bp/api/test_connection', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.success) {
                showNotification(result.message, 'success');
            } else {
                showNotification(result.message, 'error');
            }
        } catch (error) {
            showNotification(`Error: ${error.message}`, 'error');
        } finally {
            testConnectionBtn.disabled = false;
            testConnectionBtn.innerHTML = originalHtml;
        }
    });

    // Save session
    sessionForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(sessionForm);
        const sessionData = Object.fromEntries(formData.entries());
        
        if (!validateForm(sessionData)) return;
        
        const originalHtml = saveSessionBtn.innerHTML;
        saveSessionBtn.disabled = true;
        saveSessionBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
        
        try {
            const response = await fetch('/sessionsssh_bp/api/sessions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(sessionData)
            });
            
            if (response.ok) {
                showNotification('Sesión creada exitosamente', 'success');
                closeSessionModal();
                loadSessions();
            } else {
                const errorData = await response.json();
                showNotification(`Error: ${errorData.error || 'Error al crear la sesión'}`, 'error');
            }
        } catch (error) {
            showNotification(`Error: ${error.message}`, 'error');
        } finally {
            saveSessionBtn.disabled = false;
            saveSessionBtn.innerHTML = originalHtml;
        }
    });

    // Refresh sessions
    refreshBtn.addEventListener('click', () => {
        refreshBtn.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> Actualizando...';
        loadSessions().finally(() => {
            refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Actualizar';
        });
    });

    // Initialize
    loadSessions();
    authTypeSelect.dispatchEvent(new Event('change'));
});
</script>

<style>

{% endblock %}
