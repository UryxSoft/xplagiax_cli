{% extends "base/adm_base.html" %}
{% block content %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/document1.css') }}" />
    <!-- Main Content -->
     <div class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Gestión de Países</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="exportCountries()">
                    <i class="bi bi-file-earmark-arrow-up"></i>
                    Exportar
                </button>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-square"></i>
                    Nuevo País
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label"><i class="bi bi-search"></i>  Buscar</label>
                    <input type="text" class="filter-input" id="searchInput" placeholder="Nombre del país...">
                </div>
                <div class="filter-group">
                    <label class="filter-label"><i class="bi bi-calendar3"></i>  Fecha desde</label>
                    <input type="date" class="filter-input" id="dateFromFilter">
                </div>
            </div>
            <div class="filters-actions">
                <button class="btn btn-primary btn-filter" onclick="applyFilters()">
                    <i class="bi bi-funnel"></i>
                    Filtrar
                </button>
                <button class="btn btn-secondary btn-filter" onclick="clearFilters()">
                    <i class="bi bi-eraser"></i>
                    Limpiar
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 24px;">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-title">Total Países</div>
                    <div class="stat-icon" style="background: #e3f2fd; color: #1976d2;"><i class="bi bi-globe-americas"></i></div>
                </div>
                <div class="stat-value" id="totalCountries">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-title"> Este Mes</div>
                    <div class="stat-icon" style="background: #e8f5e8; color: #2e7d32;"><i class="bi bi-calendar3"></i> </div>
                </div>
                <div class="stat-value" id="monthlyCountries">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-title">Más Reciente</div>
                    <div class="stat-icon" style="background: #fff3e0; color: #f57c00;"><i class="bi bi-calendar3"></i></div>
                </div>
                <div class="stat-value" id="latestCountry">-</div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-container">
            <div class="table-header">
                <h3 class="table-title">Lista de Países</h3>
                <span class="table-stats" id="tableStats">Cargando...</span>
            </div>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                Cargando países...
            </div>

            <table class="data-table" id="countriesTable">
                <thead>
                    <tr>
                        <th onclick="sortTable('id')">ID</th>
                        <th onclick="sortTable('country')">País</th>
                        <th onclick="sortTable('created_date')">Fecha Creación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="countriesTableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>

            <div class="pagination">
                <div class="pagination-info" id="paginationInfo">
                    Mostrando 0 de 0 países
                </div>
                <div class="pagination-controls" id="paginationControls">
                    <!-- Pagination buttons will be generated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Country Modal -->
    <div class="modal" id="countryModal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo País</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="countryForm">
                    <input type="hidden" id="countryId">
                    
                    <div class="form-group">
                        <label class="form-label">Nombre del País *</label>
                        <input type="text" class="form-input" id="countryName" required placeholder="Ej: República Dominicana">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeModal()"><i class="bi bi-x-square"></i> Cancelar</button>
                <button class="btn btn-primary" onclick="saveCountry()"><i class="bi bi-save"></i>  Guardar</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/countries.js')}}"></script>
{% endblock %}
