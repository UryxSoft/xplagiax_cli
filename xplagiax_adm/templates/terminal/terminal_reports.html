{% extends "base/adm_base.html" %}
{% block content %}
    <link rel="stylesheet"   href="{{ url_for('static', filename='css/document1.css') }}" />
    <!-- ECharts CDN (jsDelivr) -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <!-- Main Content -->
    <div class="main-content"  id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Reportes y Estadísticas</h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="generateReport">
                    <span>📊</span> Generar Reporte
                </button>
            </div>
        </div>

        <!-- Report Filters -->
        <div class="filters-section">
            <h3>Filtros</h3>
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label">Fecha Inicio</label>
                    <input type="date" class="filter-input" id="startDate">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Fecha Fin</label>
                    <input type="date" class="filter-input" id="endDate">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Tipo de Reporte</label>
                    <select class="filter-input" id="reportType">
                        <option value="activity">Actividad de Sesiones</option>
                        <option value="transfers">Transferencias de Archivos</option>
                        <option value="security">Eventos de Seguridad</option>
                    </select>
                </div>
            </div>
            <div class="filters-actions">
                <button class="btn btn-primary btn-filter" id="applyFilters">Aplicar Filtros</button>
                <button class="btn btn-secondary btn-filter" id="resetFilters">Restablecer</button>
            </div>
        </div>

        <!-- Report Results -->
        <div class="table-container">
            <div class="table-header">
                <div class="table-title">Resultados del Reporte</div>
            </div>
            <div id="reportChart" style="height: 400px;"></div>
            <table class="data-table" id="reportResults">
                <thead>
                    <!-- Dynamic based on report type -->
                </thead>
                <tbody>
                    <!-- Filled by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Report Actions -->
        <div class="report-actions">
            <button class="btn btn-secondary" id="exportCSV">Exportar CSV</button>
            <button class="btn btn-secondary" id="exportPDF">Exportar PDF</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/reports.js')}}"></script>
{% endblock %}
