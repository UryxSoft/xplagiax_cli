{% extends "base/adm_base.html" %}
{% block content %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Terminal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/document1.css') }}">
    <link rel="stylesheet"   href="{{ url_for('static', filename='css/terminal.css') }}" />
    <link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css">
    <div class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">
                <i class="fas fa-terminal"></i> Terminal SSH
            </h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="openSessionManager()">
                    <i class="fas fa-server"></i> Administrar Sesiones
                </button>
            </div>
        </div>

        <div id="terminalLayout">
            <div id="terminalSidebar">
                <div class="sidebar-header">
                    <h2><i class="fas fa-server"></i> Sesiones SSH</h2>
                </div>
                <div id="sessionsList"></div>
                
                <div id="currentSessionInfo">
                    <h3><i class="fas fa-plug"></i> Sesión Actual</h3>
                    <div id="connectionStatus" class="connection-status"></div>

                    <div id="sessionDetails">
                        <div><strong>Estado:</strong> <span id="sessionStatus">Desconectado</span></div>
                        <div><strong>Nombre:</strong> <span id="sessionName">-</span></div>
                        <div><strong>Servidor:</strong> <span id="sessionServer">-</span></div>
                        <div><strong>Usuario:</strong> <span id="sessionUser">-</span></div>
                      
                       
                            <!-- ... otros elementos ... -->
    
                    </div>
                </div>
                
            <!-- Buscar esta sección y asegurar que los IDs coincidan -->
            <div id="terminalStats">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-title">CPU</div>
                    </div>
                    <!-- ID debe ser cpuUsage -->
                    <div class="stat-value" id="cpuUsage">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-title">Memoria</div>
                    </div>
                    <!-- ID debe ser memoryUsage -->
                    <div class="stat-value" id="memoryUsage">0 MB</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-title">Sesiones</div>
                    </div>
                    <!-- ID debe ser activeSessionsCount -->
                    <div class="stat-value" id="activeSessionsCount">0</div>
                </div>
            </div>
            </div>
            
            <div id="terminalMain">
                <div id="terminalHeader">
                    <h1 id="terminalTitle">SSH Terminal</h1>
                    <div id="terminalControls">
                        <button id="connectBtn" onclick="connectToSession()">Conectar</button>
                        <button id="disconnectBtn" style="display:none;" onclick="disconnectSession()">Desconectar</button>
                        <button id="clearBtn" onclick="clearTerminal()">Limpiar</button>
                        <button id="fullscreenBtn" onclick="toggleFullscreen()">Pantalla Completa</button>
                    </div>
                </div>
                <div id="terminalContainer"></div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay">
            <div id="loadingSpinner"></div>
            <div id="loadingMessage">Conectando...</div>
        </div>

        <!-- Search Box -->
        <div id="terminalSearch">
            <input type="text" id="searchInput" placeholder="Buscar...">
            <button onclick="searchPrevious()">▲</button>
            <button onclick="searchNext()">▼</button>
            <button onclick="toggleSearch()">X</button>
        </div>
    </div>

    <!-- Cargar Socket.IO desde CDN -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <!-- Cargar xterm-addon-serialize -->
    <script src="https://unpkg.com/xterm-addon-serialize@0.8.0/lib/xterm-addon-serialize.js"></script>
        
    <script src="https://unpkg.com/xterm/lib/xterm.js"></script>
    <script src="https://unpkg.com/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="https://unpkg.com/xterm-addon-search/lib/xterm-addon-search.js"></script>
    <script src="https://unpkg.com/xterm-addon-web-links/lib/xterm-addon-web-links.js"></script>
    <script src="https://unpkg.com/xterm-addon-unicode11/lib/xterm-addon-unicode11.js"></script>
    <script src="{{ url_for('static', filename='js/terminal.js')}}"></script>
{% endblock %}
