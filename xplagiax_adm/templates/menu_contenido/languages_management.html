{% extends "base/adm_base.html" %}
{% block content %}
    <!-- Main Content -->
    <link rel="stylesheet"   href="{{ url_for('static', filename='css/document1.css') }}" />
    <div class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Gestión de Idiomas</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="exportLanguages()">
                    <i class="bi bi-file-earmark-arrow-up"></i>
                    Exportar
                </button>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-square"></i>
                    Nuevo Idioma
                </button>
            </div>
        </div>
        <!-- Filters -->
        <div class="filters-section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label"><i class="bi bi-search"></i>  Buscar</label>
                    <input type="text" class="filter-input" id="searchInput" placeholder="Nombre del idioma...">
                </div>
                <div class="filter-group">
                    <label class="filter-label"><i class="bi bi-translate"></i> Código</label>
                    <input type="text" class="filter-input" id="codeFilter" placeholder="Código ISO...">
                </div>
            </div>
            <div class="filters-actions">
                <button class="btn btn-primary btn-filter" onclick="applyFilters()">
                    <i class="bi bi-funnel"></i>
                    Filtrar
                </button>
                <button class="btn btn-secondary btn-filter" onclick="clearFilters()">
                    <i class="bi bi-eraser"></i>
                    Limpiar
                </button>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-container">
            <div class="table-header">
                <h3 class="table-title">Lista de Idiomas</h3>
                <span class="table-stats" id="tableStats">Cargando...</span>
            </div>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                Cargando idiomas...
            </div>

            <table class="data-table" id="languagesTable">
                <thead>
                    <tr>
                        <th onclick="sortTable('lenguage_name')">Nombre del Idioma</th>
                        <th onclick="sortTable('lenguage')">Código ISO</th>
                        <th onclick="sortTable('created_date')">Fecha Creación</th>
                        <th>Documentos</th>
                        <th>Uso</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="languagesTableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>

            <div class="pagination">
                <div class="pagination-info" id="paginationInfo">
                    Mostrando 0 de 0 idiomas
                </div>
                <div class="pagination-controls" id="paginationControls">
                    <!-- Pagination buttons will be generated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Language Modal -->
    <div class="modal" id="languageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo Idioma</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="languageForm">
                    <input type="hidden" id="languageId">
                    
                    <div class="form-group">
                        <label class="form-label">Nombre del Idioma *</label>
                        <input type="text" class="form-input" id="languageName" required placeholder="Ej: Español, English">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Código ISO *</label>
                        <input type="text" class="form-input" id="languageCode" required maxlength="2" placeholder="Ej: es, en" style="text-transform: lowercase;">
                        <div style="font-size: 12px; color: #6c757d; margin-top: 4px;">
                            Código de 2 letras según ISO 639-1
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeModal()"><i class="bi bi-x-square"></i>  Cancelar</button>
                <button class="btn btn-primary" onclick="saveLanguage()"><i class="bi bi-save"></i>  Guardar</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/languages.js')}}"></script>
{% endblock %}
