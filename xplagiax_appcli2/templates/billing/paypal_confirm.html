<!DOCTYPE html>
<html>

<head>
    <title>Confirming Subscription...</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f8f9fa;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .content {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="loader"></div>
        <h2>Finalizing your subscription...</h2>
        <p>Please wait a moment while we confirm your payment with PayPal.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const subscriptionId = "{{ subscription_id }}";
            if (!subscriptionId) {
                window.location.href = "{{ url_for('billing_bp.checkout_cancel') }}";
                return;
            }

            try {
                const response = await fetch("{{ url_for('billing_bp.paypal_confirm_subscription') }}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subscription_id: subscriptionId })
                });

                const data = await response.json();
                if (response.ok && data.redirect) {
                    window.location.href = data.redirect;
                } else {
                    alert(data.error || 'Error confirming subscription');
                    window.location.href = "{{ url_for('billing_bp.checkout_cancel') }}";
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error. Please try again.');
                window.location.href = "{{ url_for('billing_bp.checkout_cancel') }}";
            }
        });
    </script>
</body>

</html>
