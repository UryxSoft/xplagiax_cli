<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario Administrador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --danger: #ef4444;
            --success: #22c55e;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #94a3b8;
            --border: #e2e8f0;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #1e3c72, #2a5298);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .admin-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 500px;
            padding: 35px;
            position: relative;
            overflow: hidden;
            animation: fadeInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .admin-container:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            z-index: 1;
        }
        
        .admin-header {
            margin-bottom: 25px;
            text-align: center;
        }
        
        .admin-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }
        
        .admin-logo h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--dark);
            margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .admin-header p {
            color: var(--gray);
            font-size: 15px;
            margin: 0;
        }
        
        .admin-form {
            margin-top: 15px;
        }
        
        .form-group {
            position: relative;
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
            font-size: 14px;
            padding-left: 5px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: var(--light);
            color: var(--dark);
        }
        
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(58, 77, 233, 0.1);
            background: #fff;
            outline: none;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 18px;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: color 0.2s;
        }
        
        .password-toggle:hover {
            color: var(--primary);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(58, 77, 233, 0.25);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(58, 77, 233, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .notification {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            animation: fadeIn 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .notification-error {
            background: #fff5f5;
            color: var(--danger);
            border: 2px solid #fed7d7;
        }
        
        .notification-success {
            background: #f0fdf4;
            color: var(--success);
            border: 2px solid #bbf7d0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .password-strength {
            height: 5px;
            border-radius: 3px;
            margin-top: 5px;
            background: #e2e8f0;
            overflow: hidden;
        }
        
        .strength-meter {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .password-rules {
            margin-top: 10px;
            font-size: 12px;
            color: var(--gray);
        }
        
        .password-rules ul {
            padding-left: 20px;
            margin-top: 5px;
        }
        
        .password-rules li {
            margin-bottom: 3px;
        }
        
        .rule-valid {
            color: var(--success);
        }
        
        .rule-invalid {
            color: var(--danger);
        }
        
        @media (max-width: 480px) {
            .admin-container {
                padding: 25px;
            }
            
            .admin-logo h1 {
                font-size: 24px;
            }
            
            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 22px;
            }
            
            .form-input {
                padding: 12px 15px 12px 42px;
                font-size: 14px;
            }
            
            .btn-primary {
                padding: 13px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-logo">
                <div class="logo-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1>Crear Administrador</h1>
            </div>
            <p>Crea un nuevo usuario con privilegios de administrador</p>
        </div>
        
        <div id="notificationArea"></div>
        
        <form class="admin-form" id="adminForm">
            <div class="form-group">
                <label for="adminUsername" class="form-label">Nombre de usuario</label>
                <div class="input-wrapper">
                    <input type="text" id="adminUsername" name="username" class="form-input" placeholder="admin" required>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="adminEmail" class="form-label">Correo electrónico</label>
                <div class="input-wrapper">
                    <input type="email" id="adminEmail" name="email" class="form-input" placeholder="admin@example.com" required>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="adminPassword" class="form-label">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="adminPassword" name="password" class="form-input" placeholder="Crea una contraseña segura" required>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <button type="button" id="togglePassword" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="password-strength">
                    <div id="passwordStrength" class="strength-meter"></div>
                </div>
                
                <div class="password-rules">
                    <p>La contraseña debe cumplir con:</p>
                    <ul>
                        <li id="lengthRule">Mínimo 8 caracteres</li>
                        <li id="uppercaseRule">Al menos una letra mayúscula</li>
                        <li id="numberRule">Al menos un número</li>
                        <li id="specialRule">Al menos un carácter especial</li>
                    </ul>
                </div>
            </div>
            
            <div class="form-group">
                <label for="adminConfirmPassword" class="form-label">Confirmar contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="adminConfirmPassword" name="confirmPassword" class="form-input" placeholder="Repite la contraseña" required>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" id="createBtn">
                <span id="btnText">Crear Administrador</span>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const adminForm = document.getElementById('adminForm');
            const togglePassword = document.getElementById('togglePassword');
            // CORRECCIÓN: Definir correctamente passwordInput
            const passwordInput = document.getElementById('adminPassword');
            const confirmPasswordInput = document.getElementById('adminConfirmPassword');
            const createBtn = document.getElementById('createBtn');
            const passwordStrength = document.getElementById('passwordStrength');
            const notificationArea = document.getElementById('notificationArea');
            
            // Función para mostrar notificaciones
            const showNotification = (message, type = 'info') => {
                // Eliminar notificaciones existentes
                notificationArea.innerHTML = '';
                
                const notification = document.createElement('div');
                notification.className = `notification notification-${type}`;
                
                // Añadir icono según el tipo
                const icon = type === 'error' ? 
                    '<i class="fas fa-exclamation-circle"></i>' : 
                    type === 'success' ? '<i class="fas fa-check-circle"></i>' :
                    '<i class="fas fa-info-circle"></i>';
                
                notification.innerHTML = `${icon} ${message}`;
                notificationArea.appendChild(notification);
                
                // Auto eliminar después de 5 segundos
                if (type !== 'success') {
                    setTimeout(() => {
                        notification.remove();
                    }, 5000);
                }
            };
            
            // Toggle password visibility
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Change icon
                togglePassword.innerHTML = type === 'password' ? 
                    `<i class="fas fa-eye"></i>` : 
                    `<i class="fas fa-eye-slash"></i>`;
            });
            
            // Validar fortaleza de contraseña
            passwordInput.addEventListener('input', () => {
                const password = passwordInput.value;
                let strength = 0;
                
                // Validar reglas
                const hasMinLength = password.length >= 8;
                const hasUppercase = /[A-Z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
                
                // Actualizar reglas
                document.getElementById('lengthRule').className = hasMinLength ? 'rule-valid' : 'rule-invalid';
                document.getElementById('uppercaseRule').className = hasUppercase ? 'rule-valid' : 'rule-invalid';
                document.getElementById('numberRule').className = hasNumber ? 'rule-valid' : 'rule-invalid';
                document.getElementById('specialRule').className = hasSpecial ? 'rule-valid' : 'rule-invalid';
                
                // Calcular fortaleza
                if (hasMinLength) strength += 25;
                if (hasUppercase) strength += 25;
                if (hasNumber) strength += 25;
                if (hasSpecial) strength += 25;
                
                // Actualizar barra de fortaleza
                passwordStrength.style.width = `${strength}%`;
                
                // Cambiar color según fortaleza
                if (strength < 50) {
                    passwordStrength.style.background = '#ef4444'; // Rojo
                } else if (strength < 75) {
                    passwordStrength.style.background = '#f59e0b'; // Amarillo
                } else {
                    passwordStrength.style.background = '#10b981'; // Verde
                }
            });
            
            // Handle form submission
            adminForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('adminUsername').value;
                const email = document.getElementById('adminEmail').value;
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                // Validar campos
                if (!username || !email || !password || !confirmPassword) {
                    showNotification('Todos los campos son obligatorios', 'error');
                    return;
                }
                
                // Validar contraseñas
                if (password !== confirmPassword) {
                    showNotification('Las contraseñas no coinciden', 'error');
                    return;
                }
                
                // Validar fortaleza de contraseña
                const hasMinLength = password.length >= 8;
                const hasUppercase = /[A-Z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
                
                if (!hasMinLength || !hasUppercase || !hasNumber || !hasSpecial) {
                    showNotification('La contraseña no cumple con los requisitos de seguridad', 'error');
                    return;
                }
                
                // Validar email
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showNotification('Por favor ingresa un correo electrónico válido', 'error');
                    return;
                }
                
                // Mostrar estado de carga
                createBtn.innerHTML = '<div class="spinner"></div> Creando usuario...';
                createBtn.disabled = true;
                
                try {
                    // Llamada al endpoint para crear usuario
                    const response = await fetch('/create-admin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            username, 
                            email, 
                            password 
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        showNotification(result.message, 'success');
                        
                        // Resetear formulario
                        adminForm.reset();
                        passwordStrength.style.width = '0%';
                        
                        // Actualizar reglas de contraseña
                        document.querySelectorAll('.password-rules li').forEach(li => {
                            li.className = '';
                        });
                    } else {
                        showNotification(result.error || 'Error al crear usuario', 'error');
                    }
                } catch (error) {
                    console.error('Error al crear usuario:', error);
                    showNotification('Error de conexión con el servidor', 'error');
                } finally {
                    // Restaurar estado del botón
                    createBtn.innerHTML = 'Crear Administrador';
                    createBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
