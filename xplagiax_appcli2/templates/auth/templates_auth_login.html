<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 2rem; 
            background: #f7f8fb; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 400px; 
            width: 100%;
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        }
        h1 { margin-top: 0; text-align: center; color: #1e3a8a; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input[type="email"], input[type="password"] { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus { 
            outline: none; 
            border-color: #2563eb; 
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn { 
            width: 100%; 
            padding: 0.75rem; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            cursor: pointer; 
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-outline { background: white; color: #374151; border: 1px solid #d1d5db; }
        .btn-outline:hover { background: #f9fafb; }
        .oauth-buttons { margin: 1rem 0; }
        .links { text-align: center; margin-top: 1rem; }
        .links a { color: #2563eb; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .alert { 
            padding: 0.75rem; 
            border-radius: 8px; 
            margin-bottom: 1rem; 
        }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .divider { 
            text-align: center; 
            margin: 1.5rem 0; 
            position: relative; 
        }
        .divider::before { 
            content: ''; 
            position: absolute; 
            top: 50%; 
            left: 0; 
            right: 0; 
            height: 1px; 
            background: #e5e7eb; 
        }
        .divider span { 
            background: white; 
            padding: 0 1rem; 
            color: #6b7280; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sign In</h1>

        <div id="alerts"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <div class="oauth-buttons">
            <a href="/auth/google" class="btn btn-outline">
                🔍 Continue with Google
            </a>
            <a href="/auth/microsoft" class="btn btn-outline">
                🪟 Continue with Microsoft
            </a>
        </div>

        <div class="links">
            <a href="/auth/forgot-password">Forgot your password?</a> |
            <a href="/auth/signup">Create account</a> |
            <a href="/">Back to home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const alertsDiv = document.getElementById('alerts');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Clear previous alerts
            alertsDiv.innerHTML = '';
            
            if (!email || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }
            
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || '/dashboard';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Sign-in error', 'error');
                }
            } catch (error) {
                showAlert('Connection error. Please try again.', 'error');
            }
        });
        
        function showAlert(message, type) {
            const alertsDiv = document.getElementById('alerts');
            const alertClass = type === 'error' ? 'alert-error' : 'alert-success';
            alertsDiv.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
        }
        
        // Show flash messages if any
        const urlParams = new URLSearchParams(window.location.search);
        const message = urlParams.get('message');
        const type = urlParams.get('type');
        if (message) {
            showAlert(decodeURIComponent(message), type || 'info');
        }
    </script>
</body>
</html>
